---
layout: default
---
<header class="page-hero{% if page.image %} page-hero--with-image{% endif %}">
  <div class="shell page-hero__inner">
    <div>
      {% if page.eyebrow %}<p class="eyebrow">{{ page.eyebrow }}</p>{% endif %}
      <h1>{{ page.title }}</h1>
      {% if page.intro %}<p class="page-hero__intro">{{ page.intro }}</p>{% endif %}
    </div>
    {% if page.image %}
      <img src="{{ page.image | relative_url }}" alt="{{ page.image_alt | default: '' }}">
    {% endif %}
  </div>
</header>
<div class="page-content">
  {{ content }}
</div>
